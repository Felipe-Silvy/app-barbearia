<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbearia - Agenda</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <header>
      <img
        src="assets/logo_ntbarbs.jpg"
        alt="Logo Barbearia"
        class="header-logo"
      />
      <div>
        <div class="header-title">NT.BARBER</div>
        <div class="header-subtitle">
          Estilo, precisão e tradição em cada corte.
        </div>
      </div>
    </header>

    <main id="agenda-page" style="padding-top: 24px">
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon-wrapper">
          <i data-lucide="calendar" class="empty-icon"></i>
        </div>
        <h3>Nenhum agendamento</h3>
        <p>
          Você ainda não possui agendamentos marcados para os próximos dias.
        </p>
        <a
          href="agendar.html"
          class="btn-primary"
          style="
            text-decoration: none;
            text-align: center;
            display: block;
            margin-top: 24px;
          "
          >Novo Agendamento</a
        >
      </div>

      <div id="bookings-list" class="bookings-list"></div>
    </main>

    <div id="delete-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h3 style="margin-bottom: 8px; font-size: 18px">
          Cancelar Agendamento
        </h3>
        <p
          style="
            color: #525252;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
          "
        >
          Tem certeza que deseja cancelar este agendamento? Esta ação não pode
          ser desfeita.
        </p>
        <div class="modal-actions">
          <button class="btn-outline" onclick="fecharModal()">Voltar</button>
          <button class="btn-danger" onclick="confirmarCancelamento()">
            Cancelar Agendamento
          </button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item"><i data-lucide="home"></i>Início</a>
      <a href="agendar.html" class="nav-item"
        ><i data-lucide="calendar"></i>Agendar</a
      >
      <a href="agendamentos.html" class="nav-item active"
        ><i data-lucide="clock"></i>Agendamentos</a
      >
    </nav>

    <script src="scriptAgendamentos.js"></script>
  </body>
</html>
