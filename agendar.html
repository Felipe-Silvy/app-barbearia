<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbearia - Agendar</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>
  </head>
  <body>
    <div id="toast-warning" class="toast-container hidden">
      <div class="toast-content">
        <i data-lucide="alert-circle"></i>
        <span>Preencha todos os campos para continuar!</span>
      </div>
    </div>
    <header>
      <img
        src="assets/logo_ntbarbs.jpg"
        alt="Logo Barbearia"
        class="header-logo"
      />
      <div>
        <div class="header-title">NT.BARBER</div>
        <div class="header-subtitle">
          Estilo, precisão e tradição em cada corte.
        </div>
      </div>
    </header>

    <main id="booking-flow">
      <div class="stepper">
        <div class="step active" id="st-1">
          <span class="step-num">1</span>
          <p>Serviço</p>
        </div>
        <div class="step-line"></div>
        <div class="step" id="st-2">
          <span class="step-num">2</span>
          <p>Horário</p>
        </div>
        <div class="step-line"></div>
        <div class="step" id="st-3">
          <span class="step-num">3</span>
          <p>Dados</p>
        </div>
      </div>

      <section id="step-1" class="booking-step">
        <h3 class="section-title">Escolha o Serviço</h3>
        <div id="services-list" class="radio-group"></div>

        <h3 class="section-title" style="margin-top: 20px">
          Escolha o Barbeiro
        </h3>
        <div id="barbers-list" class="radio-group"></div>

        <button
          class="btn-primary"
          onclick="
            if (verificarCampos('services-list', 'barbers-list')) changeStep(2);
          "
          style="margin-top: 24px"
        >
          Continuar
        </button>
      </section>

      <section id="step-2" class="booking-step hidden">
        <div class="card" style="padding: 20px 10px">
          <h3 class="section-title">Selecione a Data</h3>
          <input type="text" id="calendario-inline" style="display: none" />
        </div>

        <h3 class="section-title" style="margin-top: 20px">Horários</h3>
        <div class="time-grid" id="time-slots"></div>

        <div style="display: flex; gap: 10px; margin-top: 20px">
          <button class="btn-outline" onclick="changeStep(1)">Voltar</button>
          <button
            class="btn-primary"
            onclick="
              if (verificarCampos('time-slots') && verificarData())
                changeStep(3);
            "
          >
            Continuar
          </button>
        </div>
      </section>

      <section id="step-3" class="booking-step hidden">
        <div class="card">
          <h3 class="section-title">Seus Dados</h3>
          <input
            type="text"
            placeholder="Nome Completo"
            class="input-field"
            id="input-name"
          />
          <input
            type="number"
            placeholder="Telefone"
            class="input-field"
            id="input-phone"
            style="margin-top: 10px"
          />
        </div>
        <button
          class="btn-primary"
          style="margin-top: 20px"
          onclick="finalizarAgendamento()"
        >
          Confirmar
        </button>
        <button
          class="btn-outline"
          style="margin-top: 10px; width: 100%"
          onclick="changeStep(2)"
        >
          Voltar
        </button>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="home.html" class="nav-item"><i data-lucide="home"></i>Início</a>
      <a href="agendar.html" class="nav-item active"
        ><i data-lucide="calendar"></i>Agendar</a
      >
      <a href="agendamentos.html" class="nav-item"
        ><i data-lucide="clock"></i>Agendamentos</a
      >
    </nav>

    <script src="scriptAgendar.js"></script>
  </body>
</html>
